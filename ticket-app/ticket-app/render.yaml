services:
  - type: web
    name: ticket-entry
    runtime: python
    buildCommand: pip install -r requirements.txt && apt-get install -y ffmpeg || true
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
