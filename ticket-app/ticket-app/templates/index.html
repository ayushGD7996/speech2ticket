<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ticket Entry</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0d0f0e;
    --surface: #141715;
    --surface2: #1a1d1b;
    --border: #2a2e2b;
    --border2: #353a36;
    --green: #1D9E75;
    --green-dim: #0f6e52;
    --green-glow: rgba(29,158,117,0.18);
    --green-light: #e1f5ee;
    --red: #e05252;
    --red-glow: rgba(224,82,82,0.18);
    --text: #e8ebe9;
    --text2: #8a9189;
    --text3: #4f5450;
    --mono: 'DM Mono', monospace;
    --sans: 'Sora', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); }

  /* layout */
  .shell { display: grid; grid-template-columns: 380px 1fr; min-height: 100vh; }

  /* left panel */
  .left {
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    padding: 2rem 1.75rem;
    gap: 1.5rem;
    position: sticky; top: 0; height: 100vh; overflow-y: auto;
  }
  .wordmark { font-family: var(--mono); font-size: 11px; letter-spacing: 0.15em; color: var(--text3); text-transform: uppercase; }
  .wordmark span { color: var(--green); }

  .api-section label { font-size: 11px; letter-spacing: 0.08em; color: var(--text3); text-transform: uppercase; display: block; margin-bottom: 6px; }
  .api-row { display: flex; gap: 8px; }
  .api-row input {
    flex: 1; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 9px 12px; font-family: var(--mono); font-size: 12px;
    color: var(--text); outline: none; transition: border 0.15s;
  }
  .api-row input:focus { border-color: var(--green); }
  .api-save {
    background: var(--green); border: none; border-radius: 8px; padding: 9px 14px;
    color: #fff; font-size: 12px; font-family: var(--sans); cursor: pointer; white-space: nowrap;
    transition: background 0.15s;
  }
  .api-save:hover { background: var(--green-dim); }
  .api-status { font-size: 11px; color: var(--text3); margin-top: 5px; }
  .api-status.ok { color: var(--green); }

  /* recorder card */
  .recorder-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 1.5rem;
    display: flex; flex-direction: column; gap: 1.25rem;
  }
  .rec-label { font-size: 11px; letter-spacing: 0.1em; color: var(--text3); text-transform: uppercase; }

  /* big record button */
  .rec-btn-wrap { display: flex; flex-direction: column; align-items: center; gap: 1rem; }
  .rec-btn {
    width: 80px; height: 80px; border-radius: 50%;
    border: 2px solid var(--border2);
    background: var(--surface2);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; position: relative; outline: none;
  }
  .rec-btn:hover { border-color: var(--green); box-shadow: 0 0 0 6px var(--green-glow); }
  .rec-btn.recording {
    border-color: var(--red);
    box-shadow: 0 0 0 6px var(--red-glow);
    animation: ring-pulse 1.4s ease-in-out infinite;
  }
  .rec-btn.processing { border-color: var(--green); opacity: 0.7; cursor: default; }
  @keyframes ring-pulse {
    0%,100% { box-shadow: 0 0 0 6px var(--red-glow); }
    50%      { box-shadow: 0 0 0 14px rgba(224,82,82,0.05); }
  }
  .rec-icon { width: 28px; height: 28px; }
  .rec-icon circle { fill: var(--green); transition: fill 0.2s; }
  .rec-btn.recording .rec-icon circle { fill: var(--red); }

  .rec-hint {
    font-family: var(--mono); font-size: 11px; color: var(--text3); text-align: center; line-height: 1.6;
  }
  .rec-hint kbd {
    display: inline-block; background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 4px; padding: 1px 5px; font-family: var(--mono); font-size: 10px; color: var(--text2);
  }

  .rec-timer { font-family: var(--mono); font-size: 28px; font-weight: 500; color: var(--red); text-align: center; display: none; }
  .rec-timer.show { display: block; }

  .status-pill {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 999px; padding: 5px 12px;
    font-family: var(--mono); font-size: 11px; color: var(--text2);
    align-self: center;
  }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); flex-shrink: 0; }
  .status-pill.listening .status-dot { background: var(--red); animation: blink 1s infinite; }
  .status-pill.processing .status-dot { background: #f0a030; animation: blink 0.6s infinite; }
  .status-pill.ok .status-dot { background: var(--green); }
  .status-pill.err .status-dot { background: var(--red); }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* parsed fields preview */
  .fields-preview { display: flex; flex-direction: column; gap: 8px; }
  .field-row { display: grid; grid-template-columns: 110px 1fr; gap: 8px; align-items: center; }
  .field-lbl { font-size: 10px; letter-spacing: 0.08em; color: var(--text3); text-transform: uppercase; }
  .field-val {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 7px; padding: 7px 10px;
    font-family: var(--mono); font-size: 12px; color: var(--text);
    outline: none; width: 100%; transition: border 0.15s;
  }
  .field-val:focus { border-color: var(--green); }
  .field-val.filled { border-color: var(--green-dim); color: #a8f0d4; }

  .add-btn {
    background: var(--green); border: none; border-radius: 9px;
    padding: 11px; color: #fff; font-family: var(--sans); font-size: 13px; font-weight: 500;
    cursor: pointer; transition: background 0.15s; letter-spacing: 0.02em;
  }
  .add-btn:hover { background: var(--green-dim); }
  .add-btn:disabled { opacity: 0.35; cursor: default; }

  .clear-btn {
    background: none; border: 1px solid var(--border2); border-radius: 9px;
    padding: 11px; color: var(--text2); font-family: var(--sans); font-size: 13px;
    cursor: pointer; transition: all 0.15s;
  }
  .clear-btn:hover { border-color: var(--text2); color: var(--text); }

  .btn-row { display: grid; grid-template-columns: 1fr auto; gap: 8px; }

  /* transcript */
  .transcript-box {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 12px;
    font-family: var(--mono); font-size: 11px; color: var(--text2);
    min-height: 36px; line-height: 1.6; font-style: italic;
  }

  /* right panel */
  .right { display: flex; flex-direction: column; }
  .right-header {
    padding: 2rem 2rem 1.25rem;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .right-header h2 { font-size: 15px; font-weight: 500; color: var(--text); }
  .count-badge {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 999px; padding: 3px 10px;
    font-family: var(--mono); font-size: 11px; color: var(--text2);
  }
  .export-btn {
    background: none; border: 1px solid var(--green); border-radius: 8px;
    padding: 8px 16px; color: var(--green); font-family: var(--sans); font-size: 12px; font-weight: 500;
    cursor: pointer; transition: all 0.15s; letter-spacing: 0.02em;
  }
  .export-btn:hover { background: var(--green-glow); }
  .export-btn:disabled { opacity: 0.3; cursor: default; }

  /* table */
  .table-wrap { flex: 1; overflow-y: auto; padding: 0 2rem 2rem; }
  table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
  thead th {
    text-align: left; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text3); padding: 0 12px 10px; font-weight: 400; border-bottom: 1px solid var(--border);
  }
  tbody tr { transition: background 0.1s; }
  tbody tr:hover td { background: var(--surface); }
  td {
    padding: 11px 12px; font-size: 13px; color: var(--text2);
    border-bottom: 1px solid var(--border); vertical-align: middle;
  }
  td.num { font-family: var(--mono); font-size: 11px; color: var(--text3); width: 36px; }
  td.name { color: var(--text); font-weight: 400; }
  td.mobile { font-family: var(--mono); font-size: 12px; color: #7ecfad; }
  .del-btn {
    background: none; border: none; cursor: pointer; color: var(--text3);
    font-size: 14px; padding: 4px 6px; border-radius: 5px; transition: all 0.1s;
  }
  .del-btn:hover { color: var(--red); background: rgba(224,82,82,0.08); }

  /* empty state */
  .empty {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 260px; gap: 10px;
  }
  .empty-icon { font-size: 32px; opacity: 0.2; }
  .empty p { font-size: 13px; color: var(--text3); }

  /* entry flash animation */
  @keyframes row-in {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .new-row td { animation: row-in 0.3s ease; }

  /* mobile */
  @media (max-width: 700px) {
    .shell { grid-template-columns: 1fr; }
    .left { height: auto; position: static; }
    .right { min-height: 50vh; }
  }
</style>
</head>
<body>
<div class="shell">

  <!-- LEFT: Controls -->
  <aside class="left">
    <div class="wordmark">Ticket Entry <span>// voice</span></div>

    <div class="api-section">
      <label>Sarvam API Key</label>
      <div class="api-row">
        <input type="password" id="apiKey" placeholder="sk-…" autocomplete="off" />
        <button class="api-save" onclick="saveKey()">Save</button>
      </div>
      <div class="api-status" id="apiStatus">not set</div>
    </div>

    <div class="recorder-card">
      <div class="rec-label">Recorder</div>

      <div class="rec-btn-wrap">
        <button class="rec-btn" id="recBtn" onclick="toggleRecord()" title="R to record, S to stop">
          <svg class="rec-icon" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="14" cy="14" r="8"/>
          </svg>
        </button>
        <div class="rec-timer" id="recTimer">0:00</div>
        <div class="rec-hint">
          press <kbd>R</kbd> to start &nbsp;·&nbsp; <kbd>S</kbd> to stop
        </div>
      </div>

      <div class="status-pill" id="statusPill">
        <span class="status-dot"></span>
        <span id="statusText">ready</span>
      </div>

      <div>
        <div class="rec-label" style="margin-bottom:6px">Transcript</div>
        <div class="transcript-box" id="transcriptBox">waiting for voice…</div>
      </div>

      <div class="fields-preview">
        <div class="rec-label" style="margin-bottom:2px">Parsed fields</div>
        <div class="field-row">
          <span class="field-lbl">Referee</span>
          <input class="field-val" id="f_referee" placeholder="—" />
        </div>
        <div class="field-row">
          <span class="field-lbl">Referee mob</span>
          <input class="field-val" id="f_ref_mobile" placeholder="—" />
        </div>
        <div class="field-row">
          <span class="field-lbl">Referred by</span>
          <input class="field-val" id="f_referred" placeholder="—" />
        </div>
        <div class="field-row">
          <span class="field-lbl">Their mob</span>
          <input class="field-val" id="f_their_mobile" placeholder="—" />
        </div>
      </div>

      <div class="btn-row">
        <button class="add-btn" id="addBtn" onclick="addRow()" disabled>Add entry ↵</button>
        <button class="clear-btn" onclick="clearFields()">Clear</button>
      </div>
    </div>
  </aside>

  <!-- RIGHT: Table -->
  <main class="right">
    <div class="right-header">
      <div style="display:flex;align-items:center;gap:10px">
        <h2>Entries</h2>
        <span class="count-badge" id="countBadge">0</span>
      </div>
      <button class="export-btn" id="exportBtn" onclick="exportExcel()" disabled>Download Excel ↓</button>
    </div>

    <div class="table-wrap">
      <div id="emptyState" class="empty">
        <div class="empty-icon">🎙️</div>
        <p>Record your first ticket to get started</p>
      </div>
      <table id="dataTable" style="display:none">
        <thead>
          <tr>
            <th>#</th>
            <th>Referee Name</th>
            <th>Referee Mobile</th>
            <th>Referred By</th>
            <th>Their Mobile</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </main>
</div>

<script>
let entries = [];
let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;
let timerInterval = null;
let timerSecs = 0;
let apiKey = localStorage.getItem("sarvam_key") || "";

// restore key
if (apiKey) {
  document.getElementById("apiKey").value = apiKey;
  setApiStatus(true);
}

function saveKey() {
  apiKey = document.getElementById("apiKey").value.trim();
  localStorage.setItem("sarvam_key", apiKey);
  setApiStatus(!!apiKey);
}

function setApiStatus(ok) {
  const el = document.getElementById("apiStatus");
  el.textContent = ok ? "✓ key saved" : "not set";
  el.className = "api-status" + (ok ? " ok" : "");
}

// keyboard shortcuts
document.addEventListener("keydown", e => {
  if (e.target.tagName === "INPUT") return;
  if (e.key === "r" || e.key === "R") { if (!isRecording) startRecord(); }
  if (e.key === "s" || e.key === "S") { if (isRecording) stopRecord(); }
  if (e.key === "Enter") { if (!document.getElementById("addBtn").disabled) addRow(); }
});

async function toggleRecord() {
  if (isRecording) stopRecord(); else await startRecord();
}

async function startRecord() {
  if (!apiKey) { setStatus("Set your API key first", "err"); return; }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];
    mediaRecorder = new MediaRecorder(stream, { mimeType: "audio/webm" });
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = () => processAudio(stream);
    mediaRecorder.start();
    isRecording = true;

    document.getElementById("recBtn").classList.add("recording");
    setStatus("listening…", "listening");
    startTimer();
  } catch(e) {
    setStatus("Mic access denied", "err");
  }
}

function stopRecord() {
  if (mediaRecorder && isRecording) {
    mediaRecorder.stop();
    isRecording = false;
    document.getElementById("recBtn").classList.remove("recording");
    document.getElementById("recBtn").classList.add("processing");
    stopTimer();
    setStatus("processing…", "processing");
  }
}

async function processAudio(stream) {
  stream.getTracks().forEach(t => t.stop());
  const blob = new Blob(audioChunks, { type: "audio/webm" });
  const formData = new FormData();
  formData.append("audio", blob, "audio.webm");

  try {
    const res = await fetch("/transcribe", {
      method: "POST",
      headers: { "X-Sarvam-Key": apiKey },
      body: formData,
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Server error");

    document.getElementById("transcriptBox").textContent = data.transcript || "(nothing heard)";
    fillFields(data.parsed);
    setStatus("done — check fields", "ok");
  } catch(e) {
    setStatus("Error: " + e.message, "err");
    document.getElementById("transcriptBox").textContent = "Error: " + e.message;
  }
  document.getElementById("recBtn").classList.remove("processing");
}

function fillFields(parsed) {
  const map = {
    f_referee: parsed.referee,
    f_ref_mobile: parsed.ref_mobile,
    f_referred: parsed.referred,
    f_their_mobile: parsed.their_mobile,
  };
  for (const [id, val] of Object.entries(map)) {
    const el = document.getElementById(id);
    el.value = val || "";
    el.classList.toggle("filled", !!val);
  }
  checkAddReady();
}

function checkAddReady() {
  const any = ["f_referee","f_ref_mobile","f_referred","f_their_mobile"]
    .some(id => document.getElementById(id).value.trim());
  document.getElementById("addBtn").disabled = !any;
}

["f_referee","f_ref_mobile","f_referred","f_their_mobile"].forEach(id => {
  document.getElementById(id).addEventListener("input", checkAddReady);
});

function addRow() {
  const row = {
    referee:     document.getElementById("f_referee").value.trim(),
    ref_mobile:  document.getElementById("f_ref_mobile").value.trim(),
    referred:    document.getElementById("f_referred").value.trim(),
    their_mobile:document.getElementById("f_their_mobile").value.trim(),
  };
  entries.push(row);
  renderTable();
  clearFields();
  setStatus("entry " + entries.length + " saved", "ok");
  document.getElementById("exportBtn").disabled = false;
}

function clearFields() {
  ["f_referee","f_ref_mobile","f_referred","f_their_mobile"].forEach(id => {
    const el = document.getElementById(id);
    el.value = "";
    el.classList.remove("filled");
  });
  document.getElementById("addBtn").disabled = true;
  document.getElementById("transcriptBox").textContent = "waiting for voice…";
}

function deleteRow(i) {
  entries.splice(i, 1);
  renderTable();
  if (!entries.length) document.getElementById("exportBtn").disabled = true;
}

function renderTable() {
  const tbody = document.getElementById("tableBody");
  const empty = document.getElementById("emptyState");
  const table = document.getElementById("dataTable");
  document.getElementById("countBadge").textContent = entries.length;

  if (!entries.length) {
    empty.style.display = "flex";
    table.style.display = "none";
    return;
  }
  empty.style.display = "none";
  table.style.display = "table";

  tbody.innerHTML = entries.map((r, i) => `
    <tr class="${i === entries.length - 1 ? 'new-row' : ''}">
      <td class="num">${i+1}</td>
      <td class="name">${r.referee || "—"}</td>
      <td class="mobile">${r.ref_mobile || "—"}</td>
      <td class="name">${r.referred || "—"}</td>
      <td class="mobile">${r.their_mobile || "—"}</td>
      <td><button class="del-btn" onclick="deleteRow(${i})">✕</button></td>
    </tr>`).join("");
}

async function exportExcel() {
  if (!entries.length) return;
  const res = await fetch("/export", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ entries }),
  });
  if (!res.ok) { alert("Export failed"); return; }
  const blob = await res.blob();
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "tickets.xlsx"; a.click();
  URL.revokeObjectURL(url);
}

function setStatus(msg, cls) {
  document.getElementById("statusText").textContent = msg;
  const pill = document.getElementById("statusPill");
  pill.className = "status-pill" + (cls ? " " + cls : "");
}

function startTimer() {
  timerSecs = 0;
  const el = document.getElementById("recTimer");
  el.classList.add("show");
  timerInterval = setInterval(() => {
    timerSecs++;
    const m = Math.floor(timerSecs / 60);
    const s = String(timerSecs % 60).padStart(2, "0");
    el.textContent = `${m}:${s}`;
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  document.getElementById("recTimer").classList.remove("show");
}
</script>
</body>
</html>
